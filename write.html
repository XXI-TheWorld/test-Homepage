<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - LinkPage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --border: #E0E0E0;
      --hover-bg: #F5F5F5;
      --wood-dark: #6B5344;
      --wood-main: #8B7355;
      --wood-light: #A08060;
      --bg-dark: #1A1A1A;
      --text-primary-dark: #F5F5F5;
      --text-secondary-dark: #999999;
      --border-dark: #333333;
      --hover-bg-dark: #2A2A2A;
    }

    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --text-primary: var(--text-primary-dark);
      --text-secondary: var(--text-secondary-dark);
      --border: var(--border-dark);
      --hover-bg: var(--hover-bg-dark);
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 72px 24px 100px;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s;
      z-index: 100;
    }

    .theme-toggle:hover {
      background: var(--hover-bg);
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.3s;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .back-link:hover {
      color: var(--text-primary);
      background: var(--hover-bg);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }

    .write-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
      background: var(--bg);
      border: 2px solid transparent;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(90deg, var(--wood-dark), var(--wood-main), var(--wood-light), var(--wood-main), var(--wood-dark)) border-box;
      border-radius: 4px;
    }

    .guest-identity {
      padding: 10px;
      background: var(--hover-bg);
      border-radius: 4px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9375rem;
      transition: border-color 0.3s, background-color 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--wood-main);
    }

    .form-input::placeholder {
      color: var(--text-secondary);
    }

    select.form-input {
      cursor: pointer;
    }

    textarea.form-input {
      min-height: 200px;
      resize: vertical;
    }

    .form-error {
      color: #e53935;
      font-size: 0.75rem;
    }

    .submit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 48px;
      background: var(--wood-main);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 400;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .submit-btn:hover {
      background: var(--wood-dark);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .submit-btn svg {
      width: 18px;
      height: 18px;
    }

    .modify-id-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modify-id-btn:hover {
      background: var(--hover-bg);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>

  <a class="back-link" href="comments.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回
  </a>

  <main class="container">
    <form class="write-form" id="writeForm">
      <div class="guest-identity" id="guestIdentity"></div>
      <input
        type="text"
        class="form-input"
        id="titleInput"
        placeholder="文章标题"
        maxlength="100"
        autocomplete="off"
      >
      <span class="form-error" id="titleError"></span>
      <select class="form-input" id="categorySelect">
        <option value="无">无</option>
        <option value="日常">日常</option>
        <option value="技术">技术</option>
        <option value="资源">资源</option>
        <option value="提问">提问</option>
        <option value="公告">公告</option>
        <option value="灵感">灵感</option>
      </select>
      <textarea
        class="form-input"
        id="bodyInput"
        placeholder="写下你的文章内容..."
        maxlength="10000"
      ></textarea>
      <span class="form-error" id="bodyError"></span>
      <button type="submit" class="submit-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        发布文章
      </button>
    </form>
  </main>

  <script>
    // ========== Theme Toggle ==========
    (function() {
      const themeToggle = document.getElementById('themeToggle');
      const body = document.body;

      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        body.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☾';
      }

      themeToggle.addEventListener('click', function() {
        const currentTheme = body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
          body.removeAttribute('data-theme');
          themeToggle.textContent = '☀';
          localStorage.setItem('theme', 'light');
        } else {
          body.setAttribute('data-theme', 'dark');
          themeToggle.textContent = '☾';
          localStorage.setItem('theme', 'dark');
        }
      });
    })();

    // ========== Guest ID ==========
    function generateGuestId() {
      return Math.floor(1000 + Math.random() * 9000).toString();
    }

    function getGuestId() {
      let guestId = localStorage.getItem('guest_id');
      if (!guestId) {
        guestId = generateGuestId();
        localStorage.setItem('guest_id', guestId);
      }
      return guestId;
    }

    function isAdmin() {
      return localStorage.getItem('admin_logged_in') === 'true';
    }

    function isGuestIdInUse(newId) {
      const articles = getArticles();
      for (let i = 0; i < articles.length; i++) {
        if (articles[i].nickname === newId) {
          return true;
        }
        if (articles[i].comments) {
          for (let j = 0; j < articles[i].comments.length; j++) {
            if (articles[i].comments[j].nickname === newId) {
              return true;
            }
          }
        }
      }
      return false;
    }

    function modifyGuestId() {
      const newId = prompt('请输入新的身份名称（最多15个中/英文字符）：');
      if (newId === null) return;
      const trimmedId = newId.trim();
      if (trimmedId.length < 1 || trimmedId.length > 15) {
        alert('身份名称需要在1-15个字符之间');
        return;
      }
      if (isGuestIdInUse(trimmedId)) {
        alert('该名称已被占用');
        return;
      }
      localStorage.setItem('guest_id', trimmedId);
      updateGuestIdentityDisplay();
      alert('身份已修改为：' + trimmedId);
    }

    function updateGuestIdentityDisplay() {
      const guestIdentity = document.getElementById('guestIdentity');
      if (isAdmin()) {
        guestIdentity.innerHTML = '当前身份：<span style="color:#e53935;font-weight:bold;">管理员</span> <button type="button" class="modify-id-btn" onclick="logoutAdmin()">退出</button>';
      } else {
        guestIdentity.innerHTML = '当前身份：' + escapeHtml(getGuestId()) + ' <button type="button" class="modify-id-btn" onclick="modifyGuestId()">修改身份</button> <button type="button" class="modify-id-btn" onclick="loginAdmin()">管理员登录</button>';
      }
    }

    function loginAdmin() {
      const code = prompt('请输入管理员激活暗号：');
      if (code === null) return;
      if (code === 'admin123') {
        localStorage.setItem('admin_logged_in', 'true');
        updateGuestIdentityDisplay();
        alert('管理员模式已激活');
      } else {
        alert('激活码错误');
      }
    }

    function logoutAdmin() {
      localStorage.removeItem('admin_logged_in');
      updateGuestIdentityDisplay();
      alert('已退出管理员模式');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== Avatar Generation ==========
    function generateAvatar(nickname) {
      const colors = [
        '#e57373', '#f06292', '#ba68c8', '#9575cd',
        '#7986cb', '#64b5f6', '#4fc3f7', '#4dd0e1',
        '#4db6ac', '#81c784', '#aed581', '#dce775',
        '#ffd54f', '#ffb74d', '#ff8a65', '#a1887f'
      ];

      let hash = 0;
      for (let i = 0; i < nickname.length; i++) {
        hash = nickname.charCodeAt(i) + ((hash << 5) - hash);
      }
      const colorIndex = Math.abs(hash) % colors.length;
      const displayChar = nickname.charAt(0).toUpperCase();

      return { char: displayChar, color: colors[colorIndex] };
    }

    // ========== LocalStorage Functions ==========
    function getArticles() {
      const data = localStorage.getItem('visitorArticles');
      return data ? JSON.parse(data) : [];
    }

    function saveArticle(article) {
      const articles = getArticles();
      articles.unshift(article);
      localStorage.setItem('visitorArticles', JSON.stringify(articles));
    }

    // ========== Form Handling ==========
    (function() {
      const form = document.getElementById('writeForm');
      const titleInput = document.getElementById('titleInput');
      const categorySelect = document.getElementById('categorySelect');
      const bodyInput = document.getElementById('bodyInput');
      const titleError = document.getElementById('titleError');
      const bodyError = document.getElementById('bodyError');

      updateGuestIdentityDisplay();

      titleInput.addEventListener('input', function() {
        titleError.textContent = '';
      });

      bodyInput.addEventListener('input', function() {
        bodyError.textContent = '';
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const nickname = isAdmin() ? '管理员' : getGuestId();
        const title = titleInput.value.trim();
        const category = categorySelect.value;
        const body = bodyInput.value.trim();

        let hasError = false;

        if (!title) {
          titleError.textContent = '请输入文章标题';
          hasError = true;
        }

        if (!body) {
          bodyError.textContent = '请输入文章内容';
          hasError = true;
        }

        if (category === '公告' && !isAdmin()) {
          alert('只有管理员才能选择此分类');
          return;
        }

        if (hasError) return;

        if (category === '无') {
          if (!confirm('确定不添加标签发布吗？')) {
            return;
          }
        }

        const avatar = generateAvatar(nickname);

        const article = {
          id: Date.now().toString(),
          nickname: nickname,
          title: title,
          category: category,
          body: body,
          timestamp: Date.now(),
          avatarColor: avatar.color,
          avatarChar: avatar.char
        };

        saveArticle(article);
        window.location.href = 'comments.html';
      });
    })();
  </script>
</body>
</html>
